# Netlify 部署配置 — Vite + React 静态站
# 文档: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# 与本地开发一致，避免 Node 版本过旧导致 Vite 8 构建失败
[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-fund --no-audit"

# SPA 回退：不抢 /data、/assets 等已有静态文件（Netlify 默认先静态后规则）
[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 词库 JSON：可协商缓存，更新部署后会换文件路径或需重新拉取
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# 带 hash 的构建产物长期缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 安全与基础头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
